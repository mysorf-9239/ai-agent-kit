schema_version: 1.0.0
experiment_id: dti-graphdta-bindingdb-seed-42
task_type: drug-target-interaction
domain: bioinformatics
dataset:
  dataset_id: bindingdb_v1
  manifest_path: manifests/bindingdb/bindingdb_v1.yaml
model:
  family: graphdta
  drug_encoder: gcn
  target_encoder: cnn
  hidden_dim: 256
training:
  seed: 42
  epochs: 100
  batch_size: 128
  learning_rate: 0.0005
evaluation:
  primary_metric: auroc
  secondary_metrics:
    - auprc
    - f1
artifacts:
  output_dir: artifacts/dti-graphdta-bindingdb-seed-42
